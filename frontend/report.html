<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivicConnect - Report Issue</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <header class="navbar">
    <a href="dashboard.html" class="nav-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 21h18M3 10h18M5 10v11M19 10v11M9 10v11M15 10v11M4 10l8-7 8 7"/>
      </svg>
      CivicConnect
    </a>
    <nav class="nav-links">
      <a href="dashboard.html" class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.9rem;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px;">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Dashboard
      </a>
    </nav>
  </header>

  <!-- Report Form Card -->
  <main class="container fade-in">
    <div style="max-width: 600px; margin: 0 auto;">
      <div class="card">
        <h2 style="margin-bottom: 0.5rem;">Report a Civic Issue</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem;">
          Provide accurate details and upload an image to help local authorities resolve the issue quickly.
        </p>

        <!-- Alert Notification Panel -->
        <div id="alert-box" style="display: none;"></div>

        <form id="report-form" enctype="multipart/form-data">
          <div class="form-group">
            <label class="form-label" for="issue-title">Issue Title</label>
            <input type="text" id="issue-title" class="form-control" placeholder="e.g. Huge Pothole on Main Road" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="issue-desc">Detailed Description</label>
            <textarea id="issue-desc" class="form-control" rows="4" placeholder="Describe the problem, severity, and any landmarks..." required></textarea>
          </div>

          <div class="form-group">
            <label class="form-label" for="issue-category">Category</label>
            <select id="issue-category" class="form-control" required>
              <option value="" disabled selected>Select category</option>
              <option value="Pothole">Pothole</option>
              <option value="Garbage Dump">Garbage Dump</option>
              <option value="Water Leakage">Water Leakage</option>
              <option value="Broken Streetlight">Broken Streetlight</option>
              <option value="Drainage Issue">Drainage Issue</option>
              <option value="Damaged Road">Damaged Road</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="issue-location">Location / Landmark</label>
            <input type="text" id="issue-location" class="form-control" placeholder="e.g. Opposite State Bank, Sector 4" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="issue-image">Upload Photo (Optional, Max 5MB)</label>
            <input type="file" id="issue-image" class="form-control" accept="image/*">
          </div>

          <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
            Submit Report
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>
        </form>
      </div>
    </div>
  </main>

  <script src="js/dashboard.js"></script>
</body>
</html>
