<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivicConnect - Create Account</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <header class="navbar">
    <a href="index.html" class="nav-logo">
      <span>🏛️</span> CivicConnect
    </a>
    <nav class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="login.html" class="btn btn-secondary">Login</a>
    </nav>
  </header>

  <!-- Registration Card -->
  <main class="container fade-in">
    <div class="auth-container">
      <div class="card">
        <div class="auth-header">
          <h2>Create Account</h2>
          <p>Join CivicConnect and start reporting local issues</p>
        </div>

        <!-- Alert Notification Panel -->
        <div id="alert-box" style="display: none;"></div>

        <form id="register-form">
          <div class="form-group">
            <label class="form-label" for="reg-name">Full Name</label>
            <input type="text" id="reg-name" class="form-control" placeholder="e.g. Aman Sharma" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="reg-email">Email Address</label>
            <input type="email" id="reg-email" class="form-control" placeholder="e.g. aman@example.com" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="reg-password">Password</label>
            <div class="password-wrapper">
              <input type="password" id="reg-password" class="form-control" placeholder="Min. 6 characters" minlength="6" required>
              <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
                <!-- Eye icon (arch over circle) -->
                <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 15 A 8 8 0 0 1 20 15" />
                  <circle cx="12" cy="15" r="3" />
                </svg>
                <!-- Eye slash icon (slashed arch over circle) -->
                <svg class="eye-slash-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                  <path d="M4 15 A 8 8 0 0 1 20 15" />
                  <circle cx="12" cy="15" r="3" />
                  <line x1="3" y1="21" x2="21" y2="3" />
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="reg-role">Role</label>
            <select id="reg-role" class="form-control">
              <option value="citizen">Citizen (Default)</option>
              <option value="admin">Admin (For Municipal Testing)</option>
            </select>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
            Create Account
          </button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
          Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 500;">Login here</a>
        </p>
      </div>
    </div>
  </main>

  <!-- Hook up Auth Javascript Logic -->
  <script src="js/auth.js"></script>
</body>
</html>
