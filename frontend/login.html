<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Login | CivicConnect</title>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&amp;family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <!-- Theme Config -->
  <script id="tailwind-config">
    try {
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "on-primary-fixed": "#00174b",
              "surface": "#f8f9ff",
              "primary-fixed": "#dbe1ff",
              "on-error-container": "#93000a",
              "surface-dim": "#cbdbf5",
              "on-primary-container": "#eeefff",
              "secondary-fixed-dim": "#4edea3",
              "on-error": "#ffffff",
              "on-surface-variant": "#434655",
              "surface-container-highest": "#d3e4fe",
              "error-container": "#ffdad6",
              "primary-fixed-dim": "#b4c5ff",
              "primary": "#004ac6",
              "surface-container-high": "#dce9ff",
              "surface-tint": "#0053db",
              "on-primary": "#ffffff",
              "on-secondary-container": "#00714d",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed": "#6ffbbe",
              "on-secondary": "#ffffff",
              "tertiary-fixed": "#ffddb8",
              "on-secondary-fixed-variant": "#005236",
              "error": "#ba1a1a",
              "inverse-on-surface": "#eaf1ff",
              "inverse-primary": "#b4c5ff",
              "on-secondary-fixed": "#002113",
              "primary-container": "#2563eb",
              "on-tertiary-container": "#ffeedd",
              "tertiary": "#784b00",
              "surface-variant": "#d3e4fe",
              "tertiary-container": "#996100",
              "surface-container": "#e5eeff",
              "inverse-surface": "#213145",
              "surface-container-low": "#eff4ff",
              "on-primary-fixed-variant": "#003ea8",
              "on-tertiary-fixed": "#2a1700",
              "background": "#f8f9ff",
              "outline": "#737686",
              "on-tertiary-fixed-variant": "#653e00",
              "tertiary-fixed-dim": "#ffb95f",
              "on-background": "#0b1c30",
              "surface-bright": "#f8f9ff",
              "on-tertiary": "#ffffff",
              "secondary-container": "#6cf8bb",
              "secondary": "#006c49",
              "on-surface": "#0b1c30",
              "outline-variant": "#c3c6d7"
            },
            "borderRadius": {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "full": "9999px"
            },
            "spacing": {
              "margin-mobile": "16px",
              "stack-md": "16px",
              "gutter": "24px",
              "margin-desktop": "40px",
              "stack-lg": "24px",
              "stack-xs": "4px",
              "stack-sm": "8px",
              "stack-xl": "48px",
              "unit": "4px",
              "container-max": "1280px"
            },
            "fontFamily": {
              "headline-lg-mobile": ["Geist"],
              "headline-lg": ["Geist"],
              "label-md": ["Geist"],
              "display-lg": ["Geist"],
              "label-sm": ["Geist"],
              "body-md": ["Inter"],
              "body-lg": ["Inter"],
              "headline-md": ["Geist"]
            },
            "fontSize": {
              "headline-lg-mobile": ["24px", { "lineHeight": "1.2", "fontWeight": "600" }],
              "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
              "label-md": ["14px", { "lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "500" }],
              "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
              "label-sm": ["12px", { "lineHeight": "1.4", "letterSpacing": "0.02em", "fontWeight": "600" }],
              "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
              "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
              "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }]
            }
          },
        },
      }
    } catch (_e) { }
  </script>
  <style>
    body {
      background-color: #f8f9ff;
      color: #0b1c30;
      font-family: 'Inter', sans-serif;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="flex flex-col min-h-screen bg-background relative overflow-x-hidden justify-between">
  
  <div class="absolute -top-40 -left-40 w-96 h-96 bg-primary-fixed/30 blur-[100px] rounded-full -z-10"></div>
  <div class="absolute top-[60vh] -right-20 w-80 h-80 bg-secondary-fixed/10 blur-[80px] rounded-full -z-10"></div>

  <!-- Header -->
  <header class="w-full px-4 md:px-margin-desktop h-16 flex justify-between items-center bg-transparent border-b border-outline-variant/30">
    <a href="index.html" class="text-headline-md font-bold text-primary flex items-center gap-stack-xs text-xl">
      CivicConnect
    </a>
    <a href="register.html" class="px-5 py-1.5 rounded-lg border border-outline-variant hover:bg-surface-container-low transition-all text-xs font-bold text-on-surface-variant">
      Create Account
    </a>
  </header>

  <!-- Login Main -->
  <main class="flex-grow flex items-center justify-center p-4">
    <div class="w-full max-w-[420px] bg-surface-container-lowest p-8 rounded-2xl border border-outline-variant shadow-lg space-y-6">
      
      <div class="auth-header text-center">
        <h2 class="text-2xl font-bold text-on-background">Welcome Back</h2>
        <p class="text-sm text-on-surface-variant mt-1">Login to report and track civic issues</p>
      </div>

      <!-- Alert Notification Panel -->
      <div id="alert-box" class="hidden p-4 rounded-xl border text-sm font-semibold transition-all"></div>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2" for="login-email">Email Address</label>
          <input type="email" id="login-email" class="w-full border-outline-variant rounded-lg p-2.5 bg-surface-container-low text-sm focus:ring-primary focus:border-primary" placeholder="e.g. aman@example.com" required>
        </div>

        <div>
          <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2" for="login-password">Password</label>
          <div class="relative password-wrapper">
            <input type="password" id="login-password" class="w-full border-outline-variant rounded-lg p-2.5 pr-10 bg-surface-container-low text-sm focus:ring-primary focus:border-primary" placeholder="Enter your password" required>
            <button type="button" class="password-toggle-btn absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-background" aria-label="Toggle password visibility">
              <!-- Eye icon -->
              <span class="material-symbols-outlined eye-icon text-lg">visibility</span>
              <!-- Eye slash icon -->
              <span class="material-symbols-outlined eye-slash-icon text-lg" style="display: none;">visibility_off</span>
            </button>
          </div>
        </div>

        <button type="submit" class="w-full bg-primary hover:bg-primary-container text-white font-bold py-3 px-6 rounded-xl flex items-center justify-center gap-2 shadow-md hover:-translate-y-0.5 active:translate-y-0 active:scale-95 transition-all text-sm mt-6">
          Login
          <span class="material-symbols-outlined text-sm">arrow_forward</span>
        </button>
      </form>

      <p class="text-center text-sm text-on-surface-variant">
        Don't have an account yet? <a href="register.html" class="text-primary font-bold hover:underline">Register here</a>
      </p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full py-4 text-center text-xs text-on-surface-variant border-t border-outline-variant/30 bg-transparent">
    &copy; 2026 CivicConnect. Built to improve city maintenance and transparency.
  </footer>

  <!-- Scripts -->
  <script src="js/auth.js"></script>
</body>
</html>
