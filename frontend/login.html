<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivicConnect - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <header class="navbar">
    <a href="index.html" class="nav-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 21h18M3 10h18M5 10v11M19 10v11M9 10v11M15 10v11M4 10l8-7 8 7"/>
      </svg>
      CivicConnect
    </a>
    <nav class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="register.html" class="btn btn-primary">Register</a>
    </nav>
  </header>

  <!-- Login Card -->
  <main class="container fade-in">
    <div class="auth-container">
      <div class="card">
        <div class="auth-header">
          <h2>Welcome Back</h2>
          <p>Login to report and track civic issues</p>
        </div>

        <!-- Alert Notification Panel -->
        <div id="alert-box" style="display: none;"></div>

        <form id="login-form">
          <div class="form-group">
            <label class="form-label" for="login-email">Email Address</label>
            <input type="email" id="login-email" class="form-control" placeholder="e.g. aman@example.com" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <div class="password-wrapper">
              <input type="password" id="login-password" class="form-control" placeholder="Enter your password" required>
              <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
                <!-- Eye icon -->
                <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 15 A 8 8 0 0 1 20 15" />
                  <circle cx="12" cy="15" r="3" />
                </svg>
                <!-- Eye slash icon -->
                <svg class="eye-slash-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                  <path d="M4 15 A 8 8 0 0 1 20 15" />
                  <circle cx="12" cy="15" r="3" />
                  <line x1="3" y1="21" x2="21" y2="3" />
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
            Login
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
          Don't have an account yet? <a href="register.html" style="color: var(--primary); font-weight: 500;">Register here</a>
        </p>
      </div>
    </div>
  </main>

  <!-- Hook up Auth Javascript Logic -->
  <script src="js/auth.js"></script>
</body>
</html>
