<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivicConnect - Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <header class="navbar">
    <div class="nav-logo">
      <span>🏛️</span> CivicConnect
    </div>
    <nav class="nav-links">
      <span id="welcome-message" style="font-weight: 500;">Welcome, Citizen</span>
      <a href="report.html" class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.9rem;">
        ➕ Report Issue
      </a>
      <button id="logout-btn" class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.9rem;">
        Logout
      </button>
    </nav>
  </header>

  <main class="container fade-in">
    <!-- Filters and Header -->
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem;">
      <h2>Community Issues</h2>
      <div style="display: flex; gap: 0.8rem; flex-wrap: wrap;">
        <button id="filter-all" class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.9rem;">
          All Issues
        </button>
        <button id="filter-my" class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.9rem;">
          My Reports
        </button>
        
        <!-- Category Filter -->
        <select id="filter-category" class="form-control" style="width: auto; padding: 0.5rem 1rem; font-size: 0.9rem; margin-bottom: 0;">
          <option value="">All Categories</option>
          <option value="Pothole">Pothole</option>
          <option value="Garbage Dump">Garbage Dump</option>
          <option value="Water Leakage">Water Leakage</option>
          <option value="Broken Streetlight">Broken Streetlight</option>
          <option value="Drainage Issue">Drainage Issue</option>
          <option value="Damaged Road">Damaged Road</option>
        </select>
      </div>
    </div>

    <!-- Alert Notification Panel -->
    <div id="alert-box" style="display: none;"></div>

    <!-- Issues List Container -->
    <div id="issues-list" class="issues-grid">
      <!-- Loading indicator or issues dynamically loaded by JS will go here -->
      <div style="text-align: center; grid-column: 1 / -1; padding: 3rem; color: var(--text-muted);">
        Loading civic issues...
      </div>
    </div>
  </main>

  <script src="js/dashboard.js"></script>
</body>
</html>
